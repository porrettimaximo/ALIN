<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resultado Cotización | ALL IN</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        :root{
          --bg:#0b0b0c;
          --panel:#121214;
          --panel-2:#17181a;
          --text:#eaeaea;
          --muted:#a8a8ad;
          --brand:#10b981; /* verde “Uber-ish” */
          --brand-2:#34d399;
          --danger:#ef4444;
          --info:#60a5fa;
          --card-shadow:0 10px 30px rgba(0,0,0,.35);
          --radius:16px;
        }
        *{box-sizing:border-box}
        html,body{height:100%}
        body{
          margin:0;
          background:linear-gradient(180deg,#0a0a0b 0%, #0e0f11 100%);
          color:var(--text);
          font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji";
          -webkit-font-smoothing:antialiased;
          -moz-osx-font-smoothing:grayscale;
        }
        header{
          position:sticky; top:0; z-index:20;
          background:rgba(11,11,12,.8);
          backdrop-filter:saturate(1.2) blur(12px);
          border-bottom:1px solid rgba(255,255,255,.06);
        }
        .topbar{
          display:flex; align-items:center; gap:12px;
          padding:14px 18px; max-width:1200px; margin:0 auto;
        }
        .brand{
          display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:.6px;
          text-transform:uppercase; color:var(--brand);
        }
        .brand .dot{width:10px; height:10px; border-radius:50%; background:var(--brand); box-shadow:0 0 24px var(--brand)}
        .back{
          display:inline-flex; align-items:center; gap:8px;
          background:transparent; color:var(--text); border:1px solid rgba(255,255,255,.08);
          padding:8px 12px; border-radius:12px; cursor:pointer; transition:all .2s;
        }
        .back:hover{background:rgba(255,255,255,.06)}
        main{max-width:1200px; margin:0 auto; padding:18px}
        .grid{
          display:grid;
          grid-template-columns: 1fr 1.2fr;
          gap:22px;
        }
        @media (max-width: 980px){
          .grid{grid-template-columns:1fr}
        }
        .card{
          background:linear-gradient(180deg,var(--panel) 0%, var(--panel-2) 100%);
          border:1px solid rgba(255,255,255,.06);
          border-radius:var(--radius);
          box-shadow:var(--card-shadow);
          overflow:hidden;
        }
        .card-head{
          padding:16px 18px;
          display:flex; align-items:center; justify-content:space-between; gap:10px;
          border-bottom:1px solid rgba(255,255,255,.06);
        }
        .card-title{display:flex; align-items:center; gap:10px; font-weight:700}
        .badge{
          display:inline-flex; align-items:center; gap:6px; font-size:.85rem;
          padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.08);
          color:var(--muted);
        }
        .content{padding:18px}
        .section-title{font-weight:700; margin:6px 0 10px 0}
        .muted{color:var(--muted)}
        .row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dashed rgba(255,255,255,.08)}
        .row:last-child{border-bottom:none}
        .total{
          display:flex; justify-content:space-between; align-items:center;
          padding:14px 0 4px; margin-top:6px; border-top:1px solid rgba(255,255,255,.12);
          font-weight:800; font-size:1.15rem;
        }
        .timeline{
          display:flex; flex-direction:column; gap:14px; margin:2px 0 14px 0;
        }
        .tl-item{display:flex; align-items:flex-start; gap:12px}
        .dot{
          width:12px; height:12px; border-radius:50%;
          box-shadow:0 0 0 3px rgba(16,185,129,.15);
          margin-top:4px;
        }
        .dot--start{background:var(--brand)}
        .dot--end{background:#60a5fa}
        .tl-content{flex:1}
        .place{
          display:flex; align-items:center; gap:8px; font-weight:700
        }
        .pill{
          display:inline-flex; align-items:center; gap:6px;
          padding:6px 10px; border-radius:999px;
          background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08);
          font-size:.86rem; color:var(--muted)
        }
        .split{
          display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:8px 0 2px;
        }
        .stat{
          background:rgba(255,255,255,.04);
          border:1px solid rgba(255,255,255,.08);
          border-radius:12px; padding:10px 12px;
          display:flex; justify-content:space-between; align-items:center; gap:12px;
          font-size:.95rem;
        }
        .stat strong{font-weight:800}
        /* Mapa */
        #mapWrap{position:relative; height:100%; min-height:560px}
        #map{
          position:relative; width:100%; height:100%;
          border-radius:var(--radius);
          overflow:hidden; border:1px solid rgba(255,255,255,.08);
          box-shadow:var(--card-shadow);
        }
        .map-overlay{
          position:absolute; inset:0; pointer-events:none;
          box-shadow:inset 0 0 120px rgba(0,0,0,.35);
        }
        /* CTA fijo */
        .cta{
          position:sticky; bottom:0; z-index:15;
          margin-top:18px; background:rgba(11,11,12,.85);
          backdrop-filter:saturate(1.2) blur(10px);
          border-top:1px solid rgba(255,255,255,.08);
        }
        .cta-inner{
          max-width:1200px; margin:0 auto; padding:14px 18px;
          display:flex; align-items:center; gap:12px; justify-content:space-between;
        }
        .btn{
          appearance:none; border:0; border-radius:14px; padding:12px 16px;
          font-weight:800; cursor:pointer; transition:transform .06s ease, filter .2s ease;
          display:inline-flex; align-items:center; gap:10px;
        }
        .btn:active{transform:translateY(1px)}
        .btn-primary{background:linear-gradient(90deg,var(--brand) 0%, var(--brand-2) 100%); color:#0c1b15}
        .btn-outline{
          background:transparent; color:var(--text);
          border:1px solid rgba(255,255,255,.18)
        }
        /* Loader */
        .loader{
          display:flex; align-items:center; gap:10px; color:var(--muted); font-size:.95rem
        }
        .dotpulse{
          width:8px; height:8px; background:var(--brand); border-radius:50%;
          animation:pulse 1.2s infinite ease-in-out;
          box-shadow:0 0 12px var(--brand);
        }
        .dotpulse:nth-child(2){animation-delay:.15s}
        .dotpulse:nth-child(3){animation-delay:.3s}
        @keyframes pulse{
          0%,80%,100%{transform:scale(0.6); opacity:.4}
          40%{transform:scale(1); opacity:1}
        }
        .error{
          background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.35);
          color:#fecaca; padding:12px; border-radius:12px; font-size:.95rem
        }
    </style>
</head>
<body>
<header>
    <div class="topbar">
        <button class="back" onclick="history.back()">
            <span aria-hidden="true">←</span> Volver
        </button>
        <div class="brand">
            <span class="dot" aria-hidden="true"></span>
            ALL&nbsp;IN
        </div>
        <span class="badge" id="badge-fecha">⏱️ —</span>
    </div>
</header>

<main>
    <div class="grid">
        <!-- Panel izquierdo -->
        <section class="card" id="panel-quote">
            <div class="card-head">
                <div class="card-title">
                    <span>📦</span> Resultado de la cotización
                </div>
                <span class="badge" id="badge-urgencia">Prioridad: estándar</span>
            </div>
            <div class="content" id="content-quote">
                <!-- Timeline origen/destino -->
                <div class="timeline" id="timeline">
                    <div class="tl-item">
                        <span class="dot dot--start" aria-hidden="true"></span>
                        <div class="tl-content">
                            <div class="place">Origen</div>
                            <div class="muted" id="cot-origen">—</div>
                        </div>
                    </div>
                    <div class="tl-item">
                        <span class="dot dot--end" aria-hidden="true"></span>
                        <div class="tl-content">
                            <div class="place">Destino</div>
                            <div class="muted" id="cot-destino">—</div>
                        </div>
                    </div>
                </div>

                <!-- Stats compactas -->
                <div class="split">
                    <div class="stat"><span class="muted">Distancia</span><strong><span id="cot-distancia">—</span> km</strong></div>
                    <div class="stat"><span class="muted">Peso</span><strong><span id="cot-peso">—</span> kg</strong></div>
                </div>
                <div class="split">
                    <div class="stat"><span class="muted">Volumen</span><strong><span id="cot-volumen">—</span> m³</strong></div>
                    <div class="stat"><span class="muted">Dimensiones</span><strong><span id="cot-largo">—</span>x<span id="cot-ancho">—</span>x<span id="cot-alto">—</span> cm</strong></div>
                </div>

                <!-- Desglose -->
                <h3 class="section-title" style="margin-top:14px;">Resumen de costos</h3>
                <div class="row"><span>Tarifa por peso</span><span class="muted">0,50 / kg</span></div>
                <div class="row"><span>Tarifa por volumen</span><span class="muted">0,80 / m³</span></div>
                <div class="row" id="row-urgencia" style="display:none">
                    <span>Adicional por urgencia</span><span style="color:var(--danger); font-weight:700">Sí</span>
                </div>
                <div class="row">
                    <span>IVA</span><span id="desglose-iva" class="muted">—</span>
                </div>
                <div class="total">
                    <span>Total</span><span id="desglose-total">—</span>
                </div>

                <div id="quote-msg" style="margin-top:10px"></div>
            </div>
        </section>

        <!-- Panel derecho: Mapa -->
        <section class="card" style="padding:14px">
            <div id="mapWrap">
                <div id="map"></div>
                <div class="map-overlay"></div>
            </div>
        </section>
    </div>

    <!-- CTA fija inferior -->
    <div class="cta">
        <div class="cta-inner">
            <div class="loader" id="loadState">
                <span class="dotpulse"></span><span class="dotpulse"></span><span class="dotpulse"></span>
                <span>Cargando cotización…</span>
            </div>
            <div style="display:flex; gap:10px; align-items:center">
                <button class="btn btn-outline" id="btn-editar">Editar datos</button>
                <button class="btn btn-primary" id="btn-pedir-transportista">Confirmar y pedir chofer</button>
            </div>
        </div>
    </div>
</main>

<!-- Google Maps API (usa tu key) -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDvT66VQ2YuyfZhp1ymuf8-H_3eo6vT9oU"></script>
<script>
    // ===== Utilidades =====
    const localeByCurrency = {
      ARS: 'es-AR',
      MXN: 'es-MX',
      USD: 'en-US',
      EUR: 'es-ES',
      CLP: 'es-CL',
      UYU: 'es-UY',
      COP: 'es-CO',
      PEN: 'es-PE',
      BRL: 'pt-BR'
    };
    function formatMoney(value, currency = 'ARS'){
      const loc = localeByCurrency[currency] || 'es-AR';
      try{
        return new Intl.NumberFormat(loc, { style:'currency', currency }).format(Number(value||0));
      }catch{ // fallback si la moneda no es soportada
        return (currency + ' ' + (Number(value||0)).toFixed(2));
      }
    }
    function setBadgeFecha(){
      const now = new Date();
      const f = now.toLocaleString('es-AR', { dateStyle:'medium', timeStyle:'short' });
      document.getElementById('badge-fecha').textContent = '⏱️ ' + f;
    }

    // ===== Estado global =====
    let cot = null;
    let map, directionsService, directionsRenderer;

    document.addEventListener('DOMContentLoaded', () => {
      setBadgeFecha();

      try{
        cot = JSON.parse(localStorage.getItem('cotizacionActual')) || null;
      }catch{ cot = null; }

      if(!cot){
        showError('No encontramos la cotización. Volvé a calcular o editá los datos.');
        document.getElementById('loadState').style.display = 'none';
        return;
      }

      hydrateUI(cot);
      initMapAndRoute(cot.origin, cot.destination);
      document.getElementById('loadState').style.display = 'none';

      // Botones
      const btnPedir = document.getElementById('btn-pedir-transportista');
      btnPedir.addEventListener('click', () => {
        localStorage.setItem('cotizacionActual', JSON.stringify(cot));
        window.location.href = '/indexCrearEnvio.html';
      });

      document.getElementById('btn-editar').addEventListener('click', () => {
        window.location.href = '/indexCotizar.html';
      });
    });

    function showError(msg){
      const box = document.getElementById('quote-msg');
      box.innerHTML = '<div class="error">⚠️ ' + (msg || 'Ocurrió un error') + '</div>';
    }

    function hydrateUI(c){
      // Moneda
      const currency = (c.currency || 'ARS').toUpperCase();

      // Origen / destino
      document.getElementById('cot-origen').textContent = c.origin || '—';
      document.getElementById('cot-destino').textContent = c.destination || '—';

      // Distancia
      document.getElementById('cot-distancia').textContent = (c.distance ?? '—');

      // Dimensiones y peso
      document.getElementById('cot-peso').textContent = (c.weight ?? '—');
      document.getElementById('cot-largo').textContent = (c.length ?? '—');
      document.getElementById('cot-ancho').textContent = (c.width ?? '—');
      document.getElementById('cot-alto').textContent = (c.height ?? '—');

      // Volumen robusto
      const L = Number(c.length), W = Number(c.width), H = Number(c.height);
      let volumenCalc = 0, volumenStr = '—';
      if([L,W,H].every(v => !isNaN(v) && v>0)){
        volumenCalc = (L*W*H)/1_000_000; // cm³ → m³
        if(volumenCalc < 0.01) volumenCalc = 0;
        volumenStr = volumenCalc.toFixed(3);
      }
      document.getElementById('cot-volumen').textContent = volumenStr;

      // IVA y total (del backend)
      const iva = Number(c.iva ?? 0);
      const total = Number(c.totalCost ?? 0);
      document.getElementById('desglose-iva').textContent = formatMoney(iva, currency);
      document.getElementById('desglose-total').textContent = formatMoney(total, currency);

      // Urgencia
      const urg = !!c.urgency;
      const badgeUrg = document.getElementById('badge-urgencia');
      const rowUrg = document.getElementById('row-urgencia');
      if(urg){
        badgeUrg.textContent = 'Prioridad: urgente';
        badgeUrg.style.color = '#fecaca';
        badgeUrg.style.borderColor = 'rgba(239,68,68,.45)';
        rowUrg.style.display = '';
      }else{
        badgeUrg.textContent = 'Prioridad: estándar';
        rowUrg.style.display = 'none';
      }
    }

    // ===== Mapa estilo nocturno “Uber-like” =====
    const NIGHT_STYLE = [
      {"elementType":"geometry","stylers":[{"color":"#1d1d20"}]},
      {"elementType":"labels.icon","stylers":[{"visibility":"off"}]},
      {"elementType":"labels.text.fill","stylers":[{"color":"#9aa0a6"}]},
      {"elementType":"labels.text.stroke","stylers":[{"color":"#1d1d20"}]},
      {"featureType":"administrative","elementType":"geometry","stylers":[{"color":"#3d3f43"}]},
      {"featureType":"poi","elementType":"labels.text.fill","stylers":[{"color":"#9aa0a6"}]},
      {"featureType":"poi.park","elementType":"geometry","stylers":[{"color":"#172317"}]},
      {"featureType":"road","elementType":"geometry","stylers":[{"color":"#2a2b2e"}]},
      {"featureType":"road","elementType":"geometry.stroke","stylers":[{"color":"#1e1f22"}]},
      {"featureType":"road","elementType":"labels.text.fill","stylers":[{"color":"#8a8f96"}]},
      {"featureType":"transit","elementType":"geometry","stylers":[{"color":"#202125"}]},
      {"featureType":"water","elementType":"geometry","stylers":[{"color":"#0e1b1a"}]}
    ];

    const ORIGIN_SVG = {
      path: "M12 2C7.58 2 4 5.58 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4.42-3.58-8-8-8zm0 10.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z",
      fillColor: "#10b981", fillOpacity: 1, strokeWeight: 0, scale: 1
    };
    const DEST_SVG = {
      path: "M19 3H5c-1.1 0-2 .9-2 2v6h2V5h14v14h-6v2h6c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z M11 21l-6-6 1.41-1.41L10 17.17V3h2v14.17l3.59-3.58L17 15l-6 6z",
      fillColor: "#60a5fa", fillOpacity: 1, strokeWeight: 0, scale: 1
    };

    function initMapAndRoute(origen, destino){
      const mapDiv = document.getElementById('map');
      if(!mapDiv) return;

      map = new google.maps.Map(mapDiv, {
        zoom: 5,
        center: { lat: -38.4161, lng: -63.6167 }, // AR centro
        styles: NIGHT_STYLE,
        disableDefaultUI: true,
        clickableIcons: false
      });

      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({
        suppressMarkers: true,
        preserveViewport: false,
        polylineOptions:{
          strokeColor:"#10b981",
          strokeOpacity: 0.95,
          strokeWeight: 5
        }
      });
      directionsRenderer.setMap(map);

      if(origen && destino){
        directionsService.route(
          {
            origin: origen,
            destination: destino,
            travelMode: google.maps.TravelMode.DRIVING
          },
          (response, status) => {
            if(status === 'OK'){
              directionsRenderer.setDirections(response);
              const leg = response.routes[0].legs[0];

              new google.maps.Marker({
                position: leg.start_location,
                map,
                icon: ORIGIN_SVG,
                title: 'Origen: ' + origen
              });

              new google.maps.Marker({
                position: leg.end_location,
                map,
                icon: DEST_SVG,
                title: 'Destino: ' + destino
              });
            }else{
              document.getElementById('mapWrap').insertAdjacentHTML('beforeend',
                '<div class="error" style="position:absolute; left:14px; right:14px; bottom:14px">No se pudo trazar la ruta.</div>'
              );
            }
          }
        );
      }else{
        document.getElementById('mapWrap').insertAdjacentHTML('beforeend',
          '<div class="error" style="position:absolute; left:14px; right:14px; bottom:14px">Falta origen o destino.</div>'
        );
      }
    }
</script>
</body>
</html>
