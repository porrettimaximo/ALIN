<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Redirigir si ya hay sesión iniciada
    (function(){
      try {
        var user = localStorage.getItem('user');
        var type = localStorage.getItem('userType');
        if (user && type) {
          if (type === 'chofer') { window.location.replace('/chofer-dashboard'); return; }
          if (type === 'cliente') { window.location.replace('/cliente-dashboard'); return; }
        }
      } catch(e) { /* ignore */ }
    })();
  </script>
  <title>ALL IN - Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b0b0c; --bg-2:#0e0f11; --panel:#121214; --panel-2:#17181a;
      --text:#ececec; --muted:#a8a8ad; --brand:#10b981; --brand-2:#34d399;
      --hair:rgba(255,255,255,.08); --hair-2:rgba(255,255,255,.12);
      --shadow:0 10px 30px rgba(0,0,0,.35); --radius:16px; --container:1200px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; background:radial-gradient(1200px 600px at 50% -200px, #101114 10%, transparent 60%), linear-gradient(#0a0a0b, #0e0f11);
      color:var(--text); font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
      display:flex; flex-direction:column;
    }
    a{color:inherit; text-decoration:none}
    .container{max-width:var(--container); margin:0 auto; padding:0 16px}

    header{position:sticky; top:0; z-index:40; background:rgba(11,11,12,.82); backdrop-filter:saturate(1.15) blur(10px); border-bottom:1px solid var(--hair)}
    .topbar{display:flex; align-items:center; justify-content:space-between; padding:14px 0}
    .brand{display:flex; align-items:center; gap:10px; font-family:Sora,Inter; font-weight:900; letter-spacing:.6px; text-transform:uppercase}
    .brand .dot{width:10px; height:10px; border-radius:50%; background:var(--brand); box-shadow:0 0 24px var(--brand)}
    .nav{display:flex; gap:10px}
    .nav a{padding:8px 12px; border:1px solid var(--hair); border-radius:12px; color:var(--muted)}
    .nav a:hover{background:rgba(255,255,255,.05); color:var(--text)}

    .auth-wrap{flex:1; display:flex; align-items:center; justify-content:center; padding:24px}
    .card{width:100%; max-width:460px; background:linear-gradient(180deg,var(--panel) 0%, var(--panel-2) 100%); border:1px solid var(--hair); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px}
    .title{font-family:Sora,Inter; font-size:2rem; font-weight:900; letter-spacing:.6px; text-transform:uppercase; display:flex; align-items:center; gap:10px}
    .subtitle{color:var(--muted); margin:6px 0 12px}

    label{display:block; margin:10px 0 6px; color:#cfd3d8; font-weight:700}
    input, select{width:100%; padding:12px; border-radius:12px; outline:none; background:var(--bg-2); color:var(--text); border:1px solid var(--hair-2)}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    @media (max-width: 520px){ .row{grid-template-columns:1fr} }

    .user-type-selector{display:flex; gap:8px; margin:10px 0 6px}
    .user-type-btn{flex:1; padding:10px; border-radius:12px; background:transparent; color:var(--muted); border:1px solid var(--hair); cursor:pointer; font-weight:800}
    .user-type-btn.active{background:linear-gradient(90deg,var(--brand) 0%, var(--brand-2) 100%); color:#07130f}

    .btn-primary{width:100%; padding:12px; border-radius:12px; border:0; cursor:pointer; font-weight:900; background:linear-gradient(90deg,var(--brand) 0%, var(--brand-2) 100%); color:#07130f; margin-top:8px}
    .btn-secondary{width:100%; padding:12px; border-radius:12px; border:1px solid var(--hair); cursor:pointer; color:var(--muted); background:transparent; margin-top:8px}
    .btn-secondary:hover{background:rgba(255,255,255,.04); color:var(--text)}

    .alert{padding:10px 12px; border-radius:10px; margin:10px 0; display:none}
    .alert-success{background:rgba(16,185,129,.15); color:#86efac; border:1px solid rgba(16,185,129,.35)}
    .alert-error{background:rgba(239,68,68,.12); color:#fecaca; border:1px solid rgba(239,68,68,.35)}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="topbar">
        <div class="brand"><span class="dot"></span>ALL&nbsp;IN</div>
        <nav class="nav">
          <a href="/">Inicio</a>
          <a href="#">Ayuda</a>
        </nav>
      </div>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="card">
      <div class="title"><span class="dot" style="width:10px;height:10px;border-radius:50%;background:var(--brand);"></span>ALL&nbsp;IN</div>
      <p class="subtitle">Accede a tu cuenta para continuar</p>

      <div class="user-type-selector">
        <button class="user-type-btn active" data-type="cliente">Cliente</button>
        <button class="user-type-btn" data-type="chofer">Chofer</button>
      </div>

      <div id="login-form">
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" placeholder="tu@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <input class="form-input" type="password" id="password" placeholder="••••••••" required>
          </div>
          <div id="login-error" class="alert alert-error"></div>
          <button type="submit" class="btn-primary">Iniciar Sesión</button>
        </form>
        <button class="btn-secondary" onclick="showRegisterForm()">Crear cuenta nueva</button>
      </div>

      <div id="register-form" style="display:none">
        <h2 style="margin: 6px 0 12px">Crear cuenta</h2>
        <form id="registerForm">
          <div class="row">
            <div class="form-group">
              <label class="form-label" for="reg-nombre">Nombre</label>
              <input class="form-input" type="text" id="reg-nombre" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-apellido">Apellido</label>
              <input class="form-input" type="text" id="reg-apellido" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email</label>
            <input class="form-input" type="email" id="reg-email" required>
          </div>
          <div class="row">
            <div class="form-group">
              <label class="form-label" for="reg-telefono">Teléfono</label>
                <input class="form-input" type="text" id="reg-telefono" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-dni">DNI</label>
              <input class="form-input" type="number" id="reg-dni" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Contraseña</label>
            <input class="form-input" type="password" id="reg-password" required>
          </div>
          <div id="chofer-fields-2" style="display:none">
            <div class="row">
              <div class="form-group">
                <label class="form-label" for="reg-licencia">Licencia</label>
                <input class="form-input" type="text" id="reg-licencia">
              </div>
              <div class="form-group">
                <label class="form-label" for="reg-vehiculo">Vehículo</label>
                <input class="form-input" type="text" id="reg-vehiculo">
              </div>
            </div>
          </div>
          <div id="register-success" class="alert alert-success"></div>
          <div id="register-error" class="alert alert-error"></div>
          <button class="btn-primary" type="submit">Registrarme</button>
          <button class="btn-secondary" onclick="showLoginForm()" type="button">Ya tengo cuenta</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    let currentUserType = 'cliente';

    // Selector de tipo de usuario
    document.querySelectorAll('.user-type-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.user-type-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentUserType = this.dataset.type;

        // mostrar campos de chofer sólo en registro
        const choferFields = document.querySelectorAll('#chofer-fields, #chofer-fields-2');
        choferFields.forEach(field => { if (field) field.style.display = currentUserType === 'chofer' ? 'block' : 'none'; });
      });
    });

    function showRegisterForm() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
    }
    function showLoginForm() {
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('login-form').style.display = 'block';
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        userType: currentUserType
      };
      try {
        const response = await fetch('/api/auth/login', { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(formData) });
        const result = await response.json();
        if (result.success) {
          localStorage.setItem('user', JSON.stringify(result.user));
          localStorage.setItem('userType', result.userType);
          const url = (result.redirectUrl && result.redirectUrl.trim().length > 0) ? result.redirectUrl : (result.userType === 'chofer' ? '/chofer-dashboard' : '/cliente-dashboard');
          window.location.href = url;
        } else {
          const el = document.getElementById('login-error');
          el.textContent = result.message || 'Credenciales inválidas';
          el.style.display = 'block';
        }
      } catch (error) {
        const el = document.getElementById('login-error');
        el.textContent = 'Error de conexión';
        el.style.display = 'block';
      }
    });

    // Registro
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = {
        nombre: document.getElementById('reg-nombre').value,
        apellido: document.getElementById('reg-apellido').value,
        email: document.getElementById('reg-email').value,
        telefono: document.getElementById('reg-telefono').value,
        dni: parseInt(document.getElementById('reg-dni').value),
        password: document.getElementById('reg-password').value,
        userType: currentUserType
      };
      if (currentUserType === 'chofer') {
        formData.licencia = document.getElementById('reg-licencia').value;
        formData.vehiculo = document.getElementById('reg-vehiculo').value;
      }
      try {
        const response = await fetch('/api/auth/register', { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(formData) });
        const result = await response.json();
        if (result.success) {
          const ok = document.getElementById('register-success');
          ok.textContent = 'Usuario registrado exitosamente';
          ok.style.display = 'block';
          document.getElementById('register-error').style.display = 'none';
          var form = document.getElementById('registerForm');
          if (form && typeof form.reset === 'function') { form.reset(); }
          setTimeout(() => { showLoginForm(); ok.style.display = 'none'; }, 1600);
        } else {
          const err = document.getElementById('register-error');
          err.textContent = result.message || 'Error al registrar usuario';
          err.style.display = 'block';
          document.getElementById('register-success').style.display = 'none';
        }
      } catch (error) {
        const err = document.getElementById('register-error');
        err.textContent = 'Error de conexión';
        err.style.display = 'block';
        document.getElementById('register-success').style.display = 'none';
      }
    });
    // Leer parámetros de la URL para preseleccionar tipo y mostrar registro
    (function(){
      const params = new URLSearchParams(window.location.search);
      const t = params.get('userType');
      const showReg = params.get('register');
      if (t === 'chofer' || t === 'cliente'){
        currentUserType = t;
        document.querySelectorAll('.user-type-btn').forEach(btn=>{
          btn.classList.toggle('active', btn.dataset.type===t);
        });
        // Mostrar/ocultar campos chofer
        const choferFields = document.querySelectorAll('#chofer-fields, #chofer-fields-2');
        choferFields.forEach(field => { if (field) field.style.display = currentUserType === 'chofer' ? 'block' : 'none'; });
      }
      if (showReg === '1' || showReg === 'true'){
        showRegisterForm();
      }
    })();
  </script>
</body>
</html>
